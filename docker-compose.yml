version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aao-postgres
    environment:
      POSTGRES_DB: aao
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: aao-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=AdminPassword123!
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q green || echo 'not healthy'"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aao-ingestion-service
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      # Database configuration
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: aao
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      
      # AWS configuration (for S3 access)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ap-southeast-2
      
      # S3 bucket configuration
      S3_OBSERVATIONS_BUCKET: fta-mobile-observations-v2
      S3_METADATA_BUCKET: ${S3_METADATA_BUCKET}
      
      # OpenSearch configuration
      OPENSEARCH_ENDPOINT: http://opensearch:9200
      
      # Python configuration
      PYTHONUNBUFFERED: 1
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    # Override default command to run backfill
    command: python -m scripts.index_rdo --new
    networks:
      - aao-network

networks:
  aao-network:
    driver: bridge

volumes:
  postgres_data:
  opensearch_data:
