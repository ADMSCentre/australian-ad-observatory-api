openapi: 3.0.3
info:
  title: Australian Ad Observatory API
  description: 'This is the documentation for the API used in the Australian Ad Observatory
    (AAO) project.


    The API is used to access the data collected by the AAO, with a focus on the data
    collected from the Australian Mobile Ad Toolkit on Android devices. The toolkit
    collects data on the ads displayed on the device, including the ad content, the
    app displaying the ad and more. To use this API, you will need to authenticate
    using a JWT token through an account granted by the AAO team.'
  termsOfService: http://swagger.io/terms/
  contact:
    email: d.k.tran@uq.edu.au
  license:
    name: MIT
    url: https://opensource.org/license/mit
  version: 1.0.0
externalDocs:
  description: Find out more about the Australian Ad Observatory
  url: https://www.admscentre.org.au/adobservatory/
servers:
- url: https://f06kj1k332.execute-api.ap-southeast-2.amazonaws.com/prod/
paths:
  /auth/login:
    post:
      summary: Log the user in and return a JSON web token.
      description: Log the user in and create a JSON web token for the user, which can be
        used to authenticate the user in future requests.
      
      tags:
      - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: A successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  token:
                    type: string
        400:
          description: A failed login
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  comment:
                    type: string
  /auth/verify:
    post:
      summary: Verify the JSON web token.
      description: Return whether the JSON web token is valid.
      
      tags:
      - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        200:
          description: A successful verification
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        400:
          description: A failed verification
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  comment:
                    type: string
                    example: VERIFY_FAILED
  /auth/cilogon/login:
    get:
      summary: Initiates CILogon OIDC login flow.
      tags:
      - auth
      - cilogon
      description: Redirects the user to the CILogon authorization endpoint to start the
        OpenID Connect authentication flow. Sets a temporary state cookie for CSRF protection.
      parameters: []
      responses:
        302:
          description: Successful initiation of the login flow. Redirects the user's browser
            to CILogon.
          headers:
            Location:
              description: The URL of the CILogon authorization endpoint where the user
                should be redirected.
              schema:
                type: string
                format: uri
            Set-Cookie:
              description: Sets the `cilogon_oauth_state` cookie containing the signed state
                value for CSRF protection and storing the intended redirect URL after authentication.
                The cookie is HttpOnly, Secure, SameSite=Lax, and has a short expiry.
              schema:
                type: string
                example: cilogon_oauth_state=...signed_state_value...; Max-Age=600; Path=/;
                  HttpOnly; Secure; SameSite=Lax
        500:
          description: Server configuration error or internal failure during login initiation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  comment:
                    type: string
                    example: Server configuration error - CILogon metadata not loaded.
  /auth/cilogon/authorize:
    get:
      summary: Handles the callback from CILogon after authentication.
      tags:
      - auth
      - cilogon
      description: Processes the authorization code and state returned by CILogon. Verifies
        the state against the cookie, fetches user information, creates an application-specific
        JWT, and redirects the user back to the frontend application with the token.
      parameters:
      - name: code
        in: query
        required: true
        description: The authorization code issued by CILogon upon successful user authentication.
        schema:
          type: string
      - name: state
        in: query
        required: true
        description: The opaque state value returned by CILogon. Used for CSRF protection
          verification against the value stored in the `cilogon_oauth_state` cookie.
        schema:
          type: string
      responses:
        302:
          description: Successful authentication and authorization. Redirects the user's
            browser back to the frontend application, embedding the application JWT in the
            URL fragment (#token=...). Clears the state cookie.
          headers:
            Location:
              description: The URL of the frontend application where the user should be
                redirected, including the application JWT in the fragment.
              schema:
                type: string
                format: uri
                example: https://your-frontend.com/#token=app_jwt_token
            Set-Cookie:
              description: Clears the `cilogon_oauth_state` cookie as it is no longer needed.
              schema:
                type: string
                example: cilogon_oauth_state=deleted; Max-Age=0; Path=/; HttpOnly; Secure;
                  SameSite=Lax
        400:
          description: Bad request due to missing parameters, state mismatch (CSRF suspected),
            or invalid/expired state cookie.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  comment:
                    type: string
                    example: Missing state, code, or cookie
        500:
          description: Internal server error during callback processing (e.g., failure to
            exchange code, fetch user info, or create JWT).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  comment:
                    type: string
                    example: Authentication failed during callback
