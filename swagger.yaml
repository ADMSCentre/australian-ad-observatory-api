      tags:
      - ads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
                  example: OR
                args:
                  type: array
                  items:
                    type: object
                session_id:
                  type: string
                  example: my-session-id
                context:
                  type: object
                  description: Additional context for the query.
                  properties:
                    continuation_key:
                      type: string
                      description: The continuation key for the next page of results, if
                        applicable.
                      example: '1729261457039'
                    page_size:
                      type: integer
                      description: The number of results to return per page.
                      example: 1000
      responses:
        200:
