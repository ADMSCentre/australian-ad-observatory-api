                  api_key:
                    type: object
                    properties:
                      id:
                        type: string
                      user_id:
                        type: string
                      title:
                        type: string
                      description:
                        type: string
                      suffix:
                        type: string
                        description: Last 6 characters of the key
                      key:
                        type: string
                        description: The full API key (only shown once)
                      created_at:
                        type: integer
                  warning:
                    type: string
                    example: Store this key securely. It will not be shown again.
        400:
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
