      summary: Retrieve the access cache for an observer and the ads that passed RDO construction.
      description: Retrieve the quick access cache for the specified observer.
      
      parameters:
      - name: observer_id
        in: path
        required: true
        schema:
          type: string
      tags:
      - ads
      responses:
        200:
          description: A successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                  ads:
                    type: array
                    items:
                      type: string
        400:
          description: A failed response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  comment:
                    type: string
                    example: OBSERVER_NOT_PROVIDED_IN_PATH
        404:
          description: No cache found for observer
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  comment:
                    type: string
                    example: NO_CACHE_FOUND_FOR_OBSERVER
      security:
      - bearerAuth: []
      - apiKeyAuth: []
  /ads/{observer_id}/recent:
    get:
      summary: Retrieve a list of ads that passed RDO construction by a specific observer in the last 7 days.
      description: This is an open endpoint "authenticated" by the observer_id in the path.
      
      parameters:
      - name: observer_id
        in: path
        required: true
        schema:
          type: string
      tags:
      - ads
      responses:
        200:
          description: A list of ad paths seen by the observer in the last 7 days.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  ads:
                    type: array
                    items:
                      type: string
                    example:
                    - observer-id-123/temp/1678886400000.ad-id-abc
                    - observer-id-123/temp/1678972800000.ad-id-def
        400:
          description: A failed response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  comment:
                    type: string
                    example: OBSERVER_NOT_PROVIDED_IN_PATH
        404:
          description: No observations found for observer
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  comment:
                    type: string
                    example: NO_OBSERVATIONS_FOUND_FOR_OBSERVER
  /ads/batch:
    post:
      summary: Retrieve metadata associated with a batch of ads.
      description: Given a list of ads in the request body (with observer_id, timestamp
        and ad_id fields for each ad), as well as a list of metadata types to include, return
        the metadata for each ad in the list.
      
      tags:
      - ads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ads:
                  type: array
                  items:
                    type: object
                    properties:
                      observer_id:
                        type: string
                      timestamp:
                        type: string
                      ad_id:
                        type: string
                metadata_types:
                  type: array
                  items:
                    type: string
                    enum:
                    - attributes
                    - tags
                    - rdo
                    - classifications
      responses:
        200:
          description: A successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  ads:
                    type: array
                    items:
                      type: object
                      properties:
