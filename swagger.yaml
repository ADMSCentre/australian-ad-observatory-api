                  example: Data Export Script
                description:
                  type: string
                  description: Optional description of the key's purpose
                  example: API key for automated data export pipeline
      responses:
        201:
          description: API key created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
