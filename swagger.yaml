      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: A successful reflection
          content:
            application/json:
              schema:
                type: object
        400:
          description: A failed reflection
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  comment:
                    type: string
  /hello:
    get:
      responses:
        200:
          description: OK
        400:
          description: Bad Request
  /hello/{user_id}:
    get:
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
      responses:
        200:
          description: OK
        400:
          description: Bad Request

